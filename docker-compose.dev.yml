version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shrinkly-postgres-dev
    environment:
      POSTGRES_USER: shrinkly
      POSTGRES_PASSWORD: shrinkly123
      POSTGRES_DB: shrinkly
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrinkly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shrinkly-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: shrinkly-server-dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://shrinkly:shrinkly123@postgres:5432/shrinkly
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npx nodemon src/server.js

volumes:
  postgres_dev_data:
