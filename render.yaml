databases:
  - name: shrinkly-db
    plan: free
    databaseName: shrinkly
    user: shrinkly

services:
  - type: redis
    name: shrinkly-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: shrinkly-server
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shrinkly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shrinkly-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://shrinkly-client.onrender.com
    healthCheckPath: /api/health

  - type: web
    name: shrinkly-client
    plan: free
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://shrinkly-server.onrender.com
